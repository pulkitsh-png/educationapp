<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>✨ KidsPlanner</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com https://*.gstatic.com https://firestore.googleapis.com wss://*.firebaseio.com https://fonts.googleapis.com https://fonts.gstatic.com;">

<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root {
  --bg:       #f8f5f0;
  --bg2:      #f0ebe2;
  --surface:  #ffffff;
  --border:   #e2d9cc;
  --border2:  #c8bfb0;
  --text:     #1c1814;
  --text2:    #5a5040;
  --muted:    #9a8e7e;
  --accent:   #d4521a;
  --accent2:  #e8703a;
  --radius:   14px;
  --shadow:   0 1px 8px rgba(28,24,20,.07);
  --shadow-lg:0 6px 32px rgba(28,24,20,.12);

  /* activity palette */
  --parisi:    #e63946;  --parisi-bg:    #fde8ea;
  --swim:      #0077b6;  --swim-bg:      #ddf3ff;
  --soccer:    #2d9e52;  --soccer-bg:    #e8f8ee;
  --taekwondo: #d4a017;  --taekwondo-bg: #fef8e0;
  --clarinet:  #7b4ca0;  --clarinet-bg:  #f3ecf9;
  --tutor:     #1d7874;  --tutor-bg:     #e5f5f4;
  --bhanzu:    #c44569;  --bhanzu-bg:    #fce9ee;
  --fitness:   #d4521a;  --fitness-bg:   #fef0eb;
}

/* ═══════════════════════════════════════════════
   BASE RESET
═══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;}
button{cursor:pointer;font-family:inherit;}
input,select,textarea{font-family:inherit;}
a{color:var(--accent);text-decoration:none;}

/* ═══════════════════════════════════════════════
   LAYOUT SHELL
═══════════════════════════════════════════════ */
#app{display:flex;flex-direction:column;min-height:100vh;}
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  height:60px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;
  box-shadow:var(--shadow);
}
.logo{font-family:'Baloo 2',cursive;font-size:1.4rem;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:8px;}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.user-pill{display:flex;align-items:center;gap:7px;padding:5px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:100px;font-size:.8rem;font-weight:600;}
.user-pill .role-badge{font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:4px;}
.role-admin{background:#fff3ea;color:var(--accent);}
.role-viewer{background:#f0f9f4;color:#16a34a;}

.body-wrap{display:flex;flex:1;}
.sidebar{
  width:210px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  padding:14px 10px;
  position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;
}
.main{flex:1;padding:22px;overflow-x:hidden;padding-bottom:80px;}

/* ═══════════════════════════════════════════════
   SIDEBAR NAV
═══════════════════════════════════════════════ */
.nav-label{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);padding:10px 10px 4px;}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:10px;
  color:var(--text2);font-weight:600;font-size:.85rem;
  border:none;background:none;width:100%;text-align:left;
  transition:all .15s;margin-bottom:2px;
}
.nav-item:hover{background:var(--bg2);color:var(--text);}
.nav-item.active{background:#fff3ea;color:var(--accent);}
.nav-icon{font-size:1rem;width:20px;text-align:center;}
.sidebar-legend{padding:4px 10px;}
.legend-row{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:.72rem;color:var(--text2);}
.legend-pip{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ═══════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;border:none;font-family:inherit;font-weight:600;font-size:.83rem;transition:all .18s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{background:#b8420f;transform:translateY(-1px);box-shadow:0 3px 14px rgba(212,82,26,.35);}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--bg2);}
.btn-danger{background:#fef2f2;color:#dc2626;border:1px solid #fecaca;}
.btn-danger:hover{background:#fee2e2;}
.btn-sm{padding:6px 12px;font-size:.78rem;border-radius:8px;}
.btn-icon{padding:7px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:.95rem;}
.btn-icon:hover{background:var(--border);}

/* ═══════════════════════════════════════════════
   FORMS
═══════════════════════════════════════════════ */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:.73rem;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;
  padding:9px 13px;color:var(--text);font-family:inherit;font-size:.9rem;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(212,82,26,.1);}
.form-select option{background:#fff;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-hint{font-size:.73rem;color:var(--muted);margin-top:4px;}
.form-error{font-size:.73rem;color:#dc2626;margin-top:4px;}

/* ═══════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════ */
.modal-bg{
  position:fixed;inset:0;background:rgba(28,24,20,.55);z-index:500;
  display:flex;align-items:center;justify-content:center;padding:20px;
  backdrop-filter:blur(3px);
}
.modal{
  background:var(--surface);border-radius:20px;padding:26px;
  width:100%;max-width:480px;max-height:92vh;overflow-y:auto;
  box-shadow:var(--shadow-lg);animation:fadeUp .22s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.2rem;}
.modal-close{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:3px 8px;color:var(--muted);font-size:1rem;}
.modal-actions{display:flex;gap:9px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap;}

/* ═══════════════════════════════════════════════
   PAGE HEADER
═══════════════════════════════════════════════ */
.page-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.page-title{font-family:'Baloo 2',cursive;font-size:1.55rem;font-weight:800;}
.page-sub{font-size:.82rem;color:var(--muted);margin-top:2px;}

/* ═══════════════════════════════════════════════
   CHILD FILTER TABS
═══════════════════════════════════════════════ */
.child-tabs{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap;}
.child-tab{
  display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:100px;
  border:2px solid var(--border);background:var(--surface);
  font-weight:600;font-size:.8rem;cursor:pointer;color:var(--text2);transition:all .15s;
}
.child-tab:hover{border-color:var(--border2);}
.child-tab.active{border-color:var(--accent);background:#fff3ea;color:var(--accent);}

/* ═══════════════════════════════════════════════
   WEEK VIEW
═══════════════════════════════════════════════ */
.week-nav-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.week-label{font-family:'Baloo 2',cursive;font-weight:700;font-size:1rem;flex:1;min-width:160px;}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.week-grid{display:grid;grid-template-columns:repeat(7,minmax(118px,1fr));gap:7px;min-width:840px;}
.day-col{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;min-height:260px;display:flex;flex-direction:column;transition:border-color .2s;}
.day-col.today{border-color:var(--accent);box-shadow:0 0 0 2px rgba(212,82,26,.12);}
.day-hd{padding:9px 8px 7px;text-align:center;border-bottom:1px solid var(--border);background:var(--bg2);}
.day-name{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.day-num{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.35rem;line-height:1;margin-top:2px;}
.day-col.today .day-num{color:var(--accent);}
.day-events{padding:6px;display:flex;flex-direction:column;gap:3px;flex:1;}
.event-chip{border-radius:8px;padding:5px 8px;font-size:.7rem;font-weight:600;cursor:pointer;border:none;text-align:left;width:100%;line-height:1.3;transition:all .15s;}
.event-chip:hover{filter:brightness(.94);transform:scale(1.02);}
.ec-title{display:block;font-weight:700;}
.ec-time{display:block;opacity:.7;font-size:.62rem;margin-top:1px;}
.ec-child{display:block;font-size:.6rem;opacity:.75;}
.day-add-btn{margin:4px 6px 6px;padding:6px;border-radius:8px;border:1.5px dashed var(--border2);background:transparent;color:var(--muted);font-size:.72rem;font-family:inherit;font-weight:600;cursor:pointer;transition:all .15s;}
.day-add-btn:hover{border-color:var(--accent);color:var(--accent);background:#fff8f4;}

/* ═══════════════════════════════════════════════
   MONTH GRID
═══════════════════════════════════════════════ */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;min-width:460px;}
.month-day-hd{text-align:center;font-size:.67rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:7px 3px;}
.month-cell{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:6px;min-height:68px;cursor:pointer;transition:all .15s;}
.month-cell:hover{border-color:var(--border2);background:var(--bg2);}
.month-cell.today{border-color:var(--accent);}
.month-cell.dim{opacity:.3;}
.month-dnum{font-family:'Baloo 2',cursive;font-weight:800;font-size:.85rem;margin-bottom:3px;}
.month-cell.today .month-dnum{color:var(--accent);}
.month-dots{display:flex;flex-wrap:wrap;gap:2px;}
.month-dot{width:6px;height:6px;border-radius:2px;}

/* ═══════════════════════════════════════════════
   UPCOMING
═══════════════════════════════════════════════ */
.upcoming-list{display:flex;flex-direction:column;gap:8px;}
.upcoming-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;}
.upcoming-item:hover{border-color:var(--border2);box-shadow:var(--shadow);}
.upcoming-stripe{width:4px;border-radius:3px;align-self:stretch;flex-shrink:0;}
.upcoming-name{font-weight:700;font-size:.88rem;}
.upcoming-meta{font-size:.75rem;color:var(--muted);margin-top:2px;}
.upcoming-right{text-align:right;flex-shrink:0;}
.upcoming-dow{font-family:'Baloo 2',cursive;font-weight:800;font-size:.88rem;color:var(--text2);}
.upcoming-notif{font-size:.67rem;color:var(--muted);margin-top:1px;}
.today-badge{background:var(--accent);color:#fff;border-radius:5px;padding:1px 6px;font-size:.65rem;font-weight:700;}

/* ═══════════════════════════════════════════════
   SETTINGS & CARDS
═══════════════════════════════════════════════ */
.settings-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;}
.settings-card h3{font-family:'Baloo 2',cursive;font-weight:800;font-size:1rem;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.toggle-row:last-child{border-bottom:none;}
.toggle{width:42px;height:23px;background:var(--border);border-radius:12px;cursor:pointer;border:none;position:relative;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--accent);}
.toggle::after{content:'';position:absolute;width:17px;height:17px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.18);}
.toggle.on::after{transform:translateX(19px);}
.info-box{border-radius:10px;padding:12px 14px;font-size:.8rem;line-height:1.65;margin-bottom:12px;}
.info-box.green{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
.info-box.orange{background:#fff8f0;border:1px solid #fed7aa;color:#92400e;}
.info-box.blue{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}
.info-box.red{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;}

/* ═══════════════════════════════════════════════
   STATS
═══════════════════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.stat-val{font-family:'Baloo 2',cursive;font-weight:800;font-size:1.5rem;color:var(--accent);}
.stat-lbl{font-size:.68rem;color:var(--muted);font-weight:600;margin-top:1px;}

/* ═══════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════ */
.toast{
  position:fixed;bottom:max(76px,calc(env(safe-area-inset-bottom)+76px));
  left:50%;transform:translateX(-50%);
  background:#1c1814;color:#fff;
  padding:11px 20px;border-radius:100px;font-size:.82rem;font-weight:600;
  z-index:900;white-space:nowrap;box-shadow:var(--shadow-lg);
  animation:toastIn .28s ease both;
  pointer-events:none;
}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@media(min-width:769px){.toast{bottom:22px;}}

/* ═══════════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════════ */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#1c1814 0%,#2e241c 60%,#3e3020 100%);}
.auth-card{background:var(--surface);border-radius:22px;padding:38px 36px;width:100%;max-width:400px;box-shadow:var(--shadow-lg);animation:fadeUp .4s ease both;}
.auth-logo{font-family:'Baloo 2',cursive;font-size:1.9rem;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.auth-tagline{color:var(--muted);font-size:.85rem;margin-bottom:26px;}
.auth-divider{height:1px;background:var(--border);margin:18px 0;}
.auth-tabs{display:flex;gap:6px;margin-bottom:20px;}
.auth-tab{flex:1;padding:8px;border-radius:9px;border:1.5px solid var(--border);background:var(--bg2);font-weight:700;font-size:.82rem;color:var(--text2);transition:all .15s;}
.auth-tab.active{border-color:var(--accent);background:#fff3ea;color:var(--accent);}

/* ═══════════════════════════════════════════════
   LOADER
═══════════════════════════════════════════════ */
.loader-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-family:'Baloo 2',cursive;font-weight:700;font-size:1rem;color:var(--muted);}

/* ═══════════════════════════════════════════════
   MOBILE NAV
═══════════════════════════════════════════════ */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:300;padding:6px 0 max(6px,env(safe-area-inset-bottom));}
.mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 3px;border:none;background:none;color:var(--muted);font-size:.58rem;font-weight:700;font-family:inherit;}
.mobile-nav-item.active{color:var(--accent);}
.m-icon{font-size:1.15rem;}
@media(max-width:768px){
  .sidebar{display:none;}
  .mobile-nav{display:flex;}
  .main{padding:14px;padding-bottom:80px;}
  .form-row{grid-template-columns:1fr;}
}

/* ═══════════════════════════════════════════════
   FIREBASE CONFIG NOTICE
═══════════════════════════════════════════════ */
.config-notice{
  border:2px dashed var(--accent2);border-radius:14px;padding:24px;
  background:#fff8f4;margin-bottom:20px;
}
.config-notice h2{font-family:'Baloo 2',cursive;font-size:1.2rem;font-weight:800;color:var(--accent);margin-bottom:10px;}
.config-code{background:#1c1814;color:#f8f8f2;border-radius:9px;padding:14px;font-family:monospace;font-size:.78rem;line-height:1.8;overflow-x:auto;margin:10px 0;}
.config-code .k{color:#ff79c6;}
.config-code .s{color:#f1fa8c;}
.config-code .c{color:#6272a4;}
.step-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;font-size:.72rem;font-weight:800;margin-right:7px;flex-shrink:0;}
.step-row{display:flex;align-items:flex-start;gap:6px;margin-bottom:8px;font-size:.85rem;}
.divider{height:1px;background:var(--border);margin:14px 0;}
</style>
</head>

let db, auth;

// ── Toast ───────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const old = document.getElementById('toast');
  if(old) old.remove();
  clearTimeout(toastTimer);
  const el = document.createElement('div');
  el.id='toast'; el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  toastTimer = setTimeout(()=>el.remove(), 3200);
}

// ══════════════════════════════════════════════════════════════
//  FIREBASE INIT
// ══════════════════════════════════════════════════════════════
function initFirebase() {
  if (FIREBASE_CONFIG.apiKey === 'PASTE_YOUR_API_KEY_HERE') {
    renderConfigScreen();
    return;
  }
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    auth = firebase.auth();
    db   = firebase.firestore();
    // Auto-detect best transport (long polling fallback for restricted networks)
    db.settings({ experimentalAutoDetectLongPolling: true, merge: true });
    auth.onAuthStateChanged(onAuthChange);
    renderLoader('Connecting to Firebase…');
  } catch(e) {
    renderError('Firebase init failed: ' + e.message);
  }
}

function onAuthChange(user) {
  if (user) {
    currentUser = user;
    loadUserProfile(user.uid);
  } else {
    currentUser = null;
    userProfile = null;
    detachListeners();
    renderAuth();
  }
}

// ── Load user profile from Firestore ───────────────────────
async function loadUserProfile(uid) {
  renderLoader('Loading your planner…');
  const snap = await db.collection('users').doc(uid).get();
  if (snap.exists) {
    userProfile = snap.data();
  } else {
    // First-time user — create profile
    userProfile = {
      name: currentUser.displayName || currentUser.email.split('@')[0],
      email: currentUser.email,
      role: 'viewer',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    };
    await db.collection('users').doc(uid).set(userProfile);
  }
  attachListeners();
}

// ── Firestore real-time listeners ───────────────────────────
let pollInterval = null;

function attachListeners() {
  detachListeners();

  const unsub1 = db.collection('events').orderBy('createdAt','asc').onSnapshot(snap => {
    events = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (document.getElementById('app')) renderApp();
  }, err => {
    console.warn('events onSnapshot failed, falling back to polling:', err.code);
    startPolling();
  });

  const unsub2 = db.collection('children').orderBy('order','asc').onSnapshot(snap => {
    children = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (document.getElementById('app')) renderApp();
  }, err => console.warn('children listener error:', err.code));

  const unsub3 = db.collection('settings').doc('global').onSnapshot(snap => {
    settings = snap.exists ? snap.data() : {};
    if (document.getElementById('app')) renderApp();
  }, err => console.warn('settings listener error:', err.code));

  listeners = [unsub1, unsub2, unsub3];
  setTimeout(seedDefaultsIfEmpty, 1500);
}

// Fallback: poll every 10s if real-time listeners fail
function startPolling() {
  if (pollInterval) return;
  loadAllData();
  pollInterval = setInterval(loadAllData, 10000);
}

async function loadAllData() {
  try {
    const [evSnap, chSnap, stSnap] = await Promise.all([
      db.collection('events').orderBy('createdAt','asc').get(),
      db.collection('children').orderBy('order','asc').get(),
      db.collection('settings').doc('global').get(),
    ]);
    events   = evSnap.docs.map(d => ({id:d.id,...d.data()}));
    children = chSnap.docs.map(d => ({id:d.id,...d.data()}));
    settings = stSnap.exists ? stSnap.data() : {};
    if (document.getElementById('app')) renderApp();
  } catch(err) {
    console.error('loadAllData error:', err.code, err.message);
  }
}

function detachListeners() {
  listeners.forEach(fn => fn());
  listeners = [];
  if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
}

const canEdit = () => userProfile?.role === 'admin';

async function saveEvent(ev) {
  const data = {...ev};
  delete data.id;
  data.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
  if (!data.createdAt) data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
  if (ev.id) {
    await db.collection('events').doc(ev.id).set(data, {merge:true});
    showToast('✅ Event updated — synced across all devices!');
  } else {
    await db.collection('events').add(data);
    showToast('✅ Event added — synced across all devices!');
  }
  closeModal();
}

async function deleteEvent(id) {
  await db.collection('events').doc(id).delete();
  showToast('🗑️ Event deleted everywhere.');
  closeModal();
}

async function saveChild(child) {
  const data = {...child};
  const id = data.id; delete data.id;
  if (id) {
    await db.collection('children').doc(id).set(data, {merge:true});
  } else {
    data.order = children.length;
    await db.collection('children').add(data);
  }
  showToast('✅ Child profile saved!');
  closeModal();
}

async function deleteChild(id) {
  await db.collection('children').doc(id).delete();
  showToast('🗑️ Child removed.');
  closeModal();
}

async function saveSettings(patch) {
  await db.collection('settings').doc('global').set(patch, {merge:true});
  showToast('✅ Settings saved!');
}

async function updateUserRole(uid, role) {
  await db.collection('users').doc(uid).update({role});
  showToast('✅ Role updated.');
}

function getEventsForDay(date) {
  const dow = date.getDay();
  return events.filter(e => {
    if (filter !== 'all' && e.child !== filter) return false;
    if (e.recurring) return e.dow === dow;
    if (e.date) return isSameDay(new Date(e.date), date);
    return false;
  });
}

function weekDays() {
  return Array.from({length:7}, (_,i) => addDays(week, i));
}

function render(html) {
  document.getElementById('root').innerHTML = html;
}

function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k==='cls') e.className = v;
    else if (k==='html') e.innerHTML = v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c => {
    if (c==null) return;
    e.appendChild(typeof c==='string' ? document.createTextNode(c) : c);
  });
  return e;
}

      <button class="child-tab${filter==='all'?' active':''}" onclick="setFilter('all')">🏠 All Children</button>
      ${children.map(c=>`
        <button class="child-tab${filter===c.name?' active':''}"
          onclick="setFilter('${c.name}')"
          style="${filter===c.name?`border-color:${c.color};background:${c.color}18;color:${c.color}`:''}">
          ${c.avatar} ${c.name}
        </button>`).join('')}
    </div>`;

  const viewToggle = `
    <div class="week-nav-bar">
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm ${view==='week'?'btn-primary':'btn-secondary'}" onclick="setView('week')">Week</button>
        <button class="btn btn-sm ${view==='month'?'btn-primary':'btn-secondary'}" onclick="setView('month')">Month</button>
      </div>
      ${view==='week' ? `
        <span class="week-label">${fmtDate(wd[0])} → ${fmtDate(wd[6])}, ${wd[0].getFullYear()}</span>
        <button class="btn btn-sm btn-secondary" onclick="navWeek(-1)">‹ Prev</button>
        <button class="btn btn-sm btn-secondary" onclick="navWeek(0)">Today</button>
        <button class="btn btn-sm btn-secondary" onclick="navWeek(1)">Next ›</button>
      ` : `
        <span class="week-label">${MONTHS[month.getMonth()]} ${month.getFullYear()}</span>
        <button class="btn btn-sm btn-secondary" onclick="navMonth(-1)">‹</button>
        <button class="btn btn-sm btn-secondary" onclick="navMonth(0)">Today</button>
        <button class="btn btn-sm btn-secondary" onclick="navMonth(1)">›</button>
      `}
    </div>`;

  const grid = view==='week' ? renderWeekGrid(today, wd) : renderMonthGrid(today);

  return `
    <div class="page-hd">
      <div>
        <div class="page-title">Family Calendar</div>
        <div class="page-sub">🔥 Real-time sync — all devices update instantly</div>
      </div>
      ${canEdit() ? `<button class="btn btn-primary" onclick="openAddEvent(null)">＋ Add Event</button>` : ''}
    </div>
    ${childTabs}${viewToggle}
    <div class="scroll-x">${grid}</div>`;
}

function renderWeekGrid(today, wd) {
  return `<div class="week-grid">${wd.map(day=>{
    const evs = getEventsForDay(day);
    const isToday = isSameDay(day, today);
    return `<div class="day-col${isToday?' today':''}">
      <div class="day-hd">
        <div class="day-name">${DAYS[day.getDay()]}</div>
        <div class="day-num">${day.getDate()}</div>
      </div>
      <div class="day-events">
        ${evs.map(ev=>{
          const at=ACTIVITIES[ev.type]||ACTIVITIES.fitness;
          return `<button class="event-chip" style="background:${at.bg};color:${at.color}"
            onclick="openViewEvent('${ev.id}')">
            <span class="ec-title">${at.icon} ${ev.title}</span>
            ${ev.time?`<span class="ec-time">⏰ ${ev.time}</span>`:''}
            <span class="ec-child">${ev.child}</span>
          </button>`;
        }).join('')}
      </div>
      ${canEdit()?`<button class="day-add-btn" onclick="openAddEvent(${day.getDay()})">＋ Add</button>`:''}
    </div>`;
  }).join('')}</div>`;
}

function renderMonthGrid(today) {
  const year=month.getFullYear(), mo=month.getMonth();
  const first=new Date(year,mo,1).getDay();
  const total=new Date(year,mo+1,0).getDate();
  const cells=[];
  for(let i=0;i<first;i++) cells.push(null);
  for(let d=1;d<=total;d++) cells.push(new Date(year,mo,d));
  while(cells.length%7!==0) cells.push(null);
  return `<div class="month-grid">
    ${DAYS.map(d=>`<div class="month-day-hd">${d}</div>`).join('')}
    ${cells.map(d=>{
      if(!d) return `<div class="month-cell dim"></div>`;
      const evs=getEventsForDay(d);
      return `<div class="month-cell${isSameDay(d,today)?' today':''}"
        onclick="navWeekTo('${d.toISOString()}')">
        <div class="month-dnum">${d.getDate()}</div>
        <div class="month-dots">
          ${evs.slice(0,8).map(e=>`<span class="month-dot" style="background:${(ACTIVITIES[e.type]||ACTIVITIES.fitness).color}" title="${e.title}"></span>`).join('')}
          ${evs.length>8?`<span style="font-size:.58rem;color:var(--muted)">+${evs.length-8}</span>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ─── UPCOMING ────────────────────────────────────────────────
function renderUpcomingTab(today) {
  const items=[];
  for(let i=0;i<21;i++){
    const d=addDays(today,i);
    getEventsForDay(d).forEach(e=>items.push({...e,_date:d}));
  }
  // group by day
  const groups={};
  items.forEach(e=>{
    const k=e._date.toDateString();
    if(!groups[k]) groups[k]={date:e._date,evs:[]};
    groups[k].evs.push(e);
  });

  const rows = Object.values(groups).map(g=>`
    <div style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:7px">
        <div style="font-family:'Baloo 2',cursive;font-weight:800;font-size:.98rem">
          ${isSameDay(g.date,today)?'Today':fmtFull(g.date)}
        </div>
        ${isSameDay(g.date,today)?'<span class="today-badge">TODAY</span>':''}
      </div>
      <div class="upcoming-list">
        ${g.evs.map(ev=>{
          const at=ACTIVITIES[ev.type]||ACTIVITIES.fitness;
          return `<div class="upcoming-item" onclick="openViewEvent('${ev.id}')">
            <div class="upcoming-stripe" style="background:${at.color}"></div>
            <div style="font-size:1.15rem">${at.icon}</div>
            <div style="flex:1">
              <div class="upcoming-name">${ev.title}</div>
              <div class="upcoming-meta">${ev.child}${ev.time?' · '+ev.time:''}${ev.notes?' · '+ev.notes:''}</div>
            </div>
            <div class="upcoming-right">
              <div class="upcoming-dow" style="color:${at.color}">${DAYS[g.date.getDay()]}</div>
              ${ev.notifMins?`<div class="upcoming-notif">🔔 ${ev.notifMins}min</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`).join('');

  return `
    <div class="page-hd">
      <div><div class="page-title">Upcoming</div><div class="page-sub">Next 21 days</div></div>
    </div>
    ${rows || '<div style="color:var(--muted);padding:30px 0">No upcoming events.</div>'}`;
}

function closeModal() {
  const m = document.getElementById('modal-bg');
  if(m) m.remove();
}

function showModal(html) {
  closeModal();
  const bg = document.createElement('div');
  bg.id='modal-bg'; bg.className='modal-bg';
  bg.innerHTML=`<div class="modal">${html}</div>`;
  bg.addEventListener('click', e=>{ if(e.target===bg) closeModal(); });
  document.body.appendChild(bg);
}

// ─── VIEW EVENT ──────────────────────────────────────────────
function openViewEvent(id) {
  const ev = events.find(e=>e.id===id);
  if(!ev) return;
  const at = ACTIVITIES[ev.type]||ACTIVITIES.fitness;
  showModal(`
    <div class="modal-hd">
      <div class="modal-title" style="color:${at.color}">${at.icon} ${ev.title}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    ${[['📋 Type',at.label],['👧 Child',ev.child],['📅 Schedule',ev.recurring?`Every ${DAYSFULL[ev.dow]}`:`Once on ${ev.date||'?'}`],ev.time&&['⏰ Time',ev.time],ev.notes&&['📍 Notes',ev.notes],['🔔 Remind',`${ev.notifMins||30} min before`]].filter(Boolean).map(([k,v])=>`
      <div style="display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="min-width:95px;font-weight:700;font-size:.8rem;color:var(--text2)">${k}</span>
        <span style="font-size:.86rem">${v}</span>
      </div>`).join('')}
    <div class="modal-actions">
      ${canEdit()?`<button class="btn btn-danger btn-sm" onclick="confirmDelete('${id}')">🗑️ Delete</button>`:''}
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      ${canEdit()?`<button class="btn btn-primary" onclick="openEditEvent('${id}')">✏️ Edit</button>`:''}
    </div>`);
}

async function confirmDelete(id) {
  if(confirm('Delete this event? It will be removed for ALL family members.')) {
    await deleteEvent(id);
  }
}

function openAddEvent(dow) {
  const defaultChild = children[0]?.name||'';
  openEventForm(null, dow, defaultChild);
}
function openEditEvent(id) {
  const ev = events.find(e=>e.id===id);
  if(ev) { closeModal(); setTimeout(()=>openEventForm(ev,null,null),50); }
}

        <select class="form-select" id="ef-notif">

function toggleDateField() {
  const isRec = document.getElementById('ef-recurring').value==='rec';
  document.getElementById('ef-dow-wrap').style.display = isRec?'':'none';
  document.getElementById('ef-date-wrap').style.display = isRec?'none':'';
}

async function submitEventForm(id) {
  const title = document.getElementById('ef-title').value.trim();
  if(!title) { showToast('⚠️ Please enter a title.'); return; }
  const isRec = document.getElementById('ef-recurring').value==='rec';
  const ev = {
    id: id==='null'?null:id,
    title,
    type:      document.getElementById('ef-type').value,
    child:     document.getElementById('ef-child').value,
    recurring: isRec,
    dow:       isRec ? parseInt(document.getElementById('ef-dow').value) : null,
    date:      !isRec ? document.getElementById('ef-date').value : null,
    time:      document.getElementById('ef-time').value,
    notes:     document.getElementById('ef-notes').value,
    notifMins: parseInt(document.getElementById('ef-notif').value),
  };
  await saveEvent(ev);
}

// ─── CHILD MODALS ────────────────────────────────────────────
function openAddChild() { openChildForm(null); }
function openEditChild(id) {
  const c = children.find(x=>x.id===id);
  if(c) openChildForm(c);
}

function openChildForm(c) {
  const isEdit=!!c;
  const EMOJIS=['🌟','⭐','🏆','🎯','🚀','🦁','🐯','🦊','🐧','🎨','🌈','🦋'];
  const COLORS=['#d4521a','#0077b6','#2d9e52','#d4a017','#7b4ca0','#e63946','#c44569','#1d7874'];

  showModal(`
    <div class="modal-hd">
      <div class="modal-title">${isEdit?'Edit Child':'Add Child'}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Name</label>
      <input class="form-input" id="cf-name" value="${c?.name||''}" placeholder="Child's name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Avatar Emoji</label>
      <div style="display:flex;gap:7px;flex-wrap:wrap" id="cf-emojis">
        ${EMOJIS.map(em=>`<button onclick="selectEmoji('${em}')"
          style="font-size:1.4rem;background:${(c?.avatar||'🌟')===em?'#fff3ea':'var(--bg2)'};border:2px solid ${(c?.avatar||'🌟')===em?'var(--accent)':'var(--border)'};border-radius:9px;padding:4px 8px;cursor:pointer;transition:all .15s"
          data-emoji="${em}">${em}</button>`).join('')}
      </div>
      <input type="hidden" id="cf-avatar" value="${c?.avatar||'🌟'}"/>
    </div>
    <div class="form-group">
      <label class="form-label">Theme Color</label>
      <div style="display:flex;gap:7px;flex-wrap:wrap" id="cf-colors">
        ${COLORS.map(col=>`<button onclick="selectColor('${col}')"
          style="width:30px;height:30px;border-radius:7px;background:${col};border:3px solid ${(c?.color||'#d4521a')===col?'#1c1814':'transparent'};cursor:pointer"
          data-color="${col}"></button>`).join('')}
      </div>
      <input type="hidden" id="cf-color" value="${c?.color||'#d4521a'}"/>
    </div>
    <div class="modal-actions">
      ${isEdit?`<button class="btn btn-danger btn-sm" onclick="confirmDeleteChild('${c.id}')">Remove</button>`:''}
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitChildForm(${isEdit?`'${c.id}'`:'null'})">Save</button>
    </div>`);
}

function selectEmoji(em) {
  document.getElementById('cf-avatar').value=em;
  document.querySelectorAll('#cf-emojis button').forEach(b=>{
    const sel=b.dataset.emoji===em;
    b.style.background=sel?'#fff3ea':'var(--bg2)';
    b.style.borderColor=sel?'var(--accent)':'var(--border)';
  });
}
function selectColor(col) {
  document.getElementById('cf-color').value=col;
  document.querySelectorAll('#cf-colors button').forEach(b=>{
    b.style.borderColor=b.dataset.color===col?'#1c1814':'transparent';
  });
}

async function submitChildForm(id) {
  const name=document.getElementById('cf-name').value.trim();
  if(!name) { showToast('⚠️ Please enter a name.'); return; }
  await saveChild({
    id: id==='null'?null:id,
    name,
    avatar: document.getElementById('cf-avatar').value,
    color:  document.getElementById('cf-color').value,
  });
}

async function confirmDeleteChild(id) {
  if(confirm('Remove this child? Their events will remain but unassigned.')) {
    await deleteChild(id);
  }
}

// ══════════════════════════════════════════════════════════════
//  NAVIGATION HELPERS
// ══════════════════════════════════════════════════════════════
function setFilter(f) { filter=f; renderApp(); }
function setView(v)   { view=v;   renderApp(); }
function navWeek(dir) {
  if(dir===0) week=startOfWeek(new Date());
  else week=addDays(week,dir*7);
  renderApp();
}
function navMonth(dir) {
  if(dir===0) month=new Date();
  else { month=new Date(month); month.setMonth(month.getMonth()+dir); }
  renderApp();
}
function navWeekTo(iso) {
  week=startOfWeek(new Date(iso));
  view='week';
  renderApp();
}
async function doSignOut() { await signOut(); }

// ══════════════════════════════════════════════════════════════
//  SETTINGS HELPERS
// ══════════════════════════════════════════════════════════════
async function toggleSetting(key, val) { await saveSettings({[key]:val}); }
async function saveSetting(key, val)   { await saveSettings({[key]:val}); }

async function togglePush() {
  if(Notification?.permission!=='granted') {
    const perm = await Notification.requestPermission();
    if(perm!=='granted') { showToast('⚠️ Browser denied permission.'); return; }
  }
  await saveSettings({pushNotif:!settings.pushNotif});
}

function testPush() {
  if(Notification?.permission==='granted') {
    new Notification('⭐ KidsPlanner Test',{body:'Push notifications are working!'});
    showToast('📬 Test notification sent!');
  } else showToast('⚠️ Enable push first.');
}

function testEmail() { showToast(`📧 Test email to ${settings.email||'(no email)'} — configure EmailJS keys to activate.`); }

async function confirmClearEvents() {
  if(!confirm('Delete ALL events for ALL family members? This cannot be undone.')) return;
  const snap = await db.collection('events').get();
  const batch = db.batch();
  snap.docs.forEach(d=>batch.delete(d.ref));
  await batch.commit();
  showToast('🗑️ All events deleted.');
}

async function changePassword() {
  const pass = document.getElementById('new-pass')?.value;
  if(!pass||pass.length<8) { showToast('⚠️ Password must be 8+ characters.'); return; }
  try {
    await currentUser.updatePassword(pass);
    showToast('✅ Password updated!');
  } catch(e) { showToast('❌ ' + e.message + ' (may need to re-login first)'); }
}
